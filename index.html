<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Infinite Obby</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#score{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,0.4);
padding:8px 14px;
border-radius:8px;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

//////////////////////////
// SCENE
//////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
2000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

//////////////////////////
// LIGHT
//////////////////////////

const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(10,20,10);
scene.add(sun);

scene.add(new THREE.AmbientLight(0xffffff,0.4));

//////////////////////////
// PLAYER
//////////////////////////

const player = new THREE.Object3D();
scene.add(player);

player.position.set(0,6,0);

camera.position.set(0,2,0);
player.add(camera);

//////////////////////////
// MOUSE LOOK
//////////////////////////

let yaw=0;
let pitch=0;

document.body.onclick=()=>{
document.body.requestPointerLock();
}

document.addEventListener("mousemove",(e)=>{

if(document.pointerLockElement===document.body){

yaw-=e.movementX*0.002;
pitch-=e.movementY*0.002;

pitch=Math.max(-Math.PI/2,Math.min(Math.PI/2,pitch));

player.rotation.y=yaw;
camera.rotation.x=pitch;

}

});

//////////////////////////
// CONTROLS
//////////////////////////

const keys={};

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

//////////////////////////
// PHYSICS
//////////////////////////

let velocityY=0;
let jumpCount=0;
const maxJumps=2;

const gravity=-0.015;
const jumpForce=0.32;

const walkSpeed=0.1;
const sprintSpeed=0.18;

let onGround=false;

//////////////////////////
// PLATFORMS
//////////////////////////

const platforms=[];
let highestPlatform=0;

function createPlatform(x,y,z){

const geo=new THREE.CylinderGeometry(2,2,0.8,24);
const mat=new THREE.MeshStandardMaterial({
color:0x888888,
roughness:0.9
});

const mesh=new THREE.Mesh(geo,mat);

mesh.position.set(x,y,z);

mesh.userData={
radius:2,
height:0.8
};

scene.add(mesh);
platforms.push(mesh);

if(y>highestPlatform) highestPlatform=y;

}

//////////////////////////
// START PLATFORM
//////////////////////////

createPlatform(0,0,0);

//////////////////////////
// INFINITE GENERATION
//////////////////////////

function generatePlatforms(){

while(highestPlatform < player.position.y + 80){

let x=(Math.random()-0.5)*20;
let z=(Math.random()-0.5)*20;

let y=highestPlatform+3+Math.random()*2;

createPlatform(x,y,z);

}

}

//////////////////////////
// LAVA
//////////////////////////

const lavaGeo=new THREE.CylinderGeometry(200,200,3,64);
const lavaMat=new THREE.MeshStandardMaterial({
color:0xff3300,
emissive:0xff2200
});

const lava=new THREE.Mesh(lavaGeo,lavaMat);
lava.position.y=-5;

scene.add(lava);

//////////////////////////
// BUBBLES
//////////////////////////

const bubbles=[];

for(let i=0;i<80;i++){

const g=new THREE.SphereGeometry(0.3,8,8);
const m=new THREE.MeshStandardMaterial({color:0xffaa00});

const b=new THREE.Mesh(g,m);

b.position.set(
(Math.random()-0.5)*120,
-3+Math.random()*2,
(Math.random()-0.5)*120
);

scene.add(b);

bubbles.push(b);

}

//////////////////////////
// COLLISION
//////////////////////////

function checkCollision(){

onGround=false;

for(const p of platforms){

const r=p.userData.radius;
const h=p.userData.height;

const dx=player.position.x-p.position.x;
const dz=player.position.z-p.position.z;

const dist=Math.sqrt(dx*dx+dz*dz);

const top=p.position.y+h/2;

if(
dist<r &&
player.position.y<=top+0.2 &&
player.position.y>=top-1 &&
velocityY<=0
){

player.position.y=top;
velocityY=0;

onGround=true;
jumpCount=0;

}

}

}

//////////////////////////
// MOVEMENT
//////////////////////////

function movePlayer(){

let speed=keys["ShiftLeft"]?sprintSpeed:walkSpeed;

const forward=new THREE.Vector3(0,0,-1).applyQuaternion(player.quaternion);
const right=new THREE.Vector3(1,0,0).applyQuaternion(player.quaternion);

if(keys["KeyW"]) player.position.add(forward.clone().multiplyScalar(speed));
if(keys["KeyS"]) player.position.add(forward.clone().multiplyScalar(-speed));
if(keys["KeyA"]) player.position.add(right.clone().multiplyScalar(-speed));
if(keys["KeyD"]) player.position.add(right.clone().multiplyScalar(speed));

if(keys["Space"] && jumpCount<maxJumps){

velocityY=jumpForce;
jumpCount++;

keys["Space"]=false;

}

}

//////////////////////////
// SCORE
//////////////////////////

let score=0;

function updateScore(){

score=Math.max(score,Math.floor(player.position.y));

document.getElementById("score").innerText="Score: "+score;

}

//////////////////////////
// RESPAWN
//////////////////////////

function respawn(){

player.position.set(0,6,0);
velocityY=0;
jumpCount=0;

}

//////////////////////////
// GAME LOOP
//////////////////////////

function animate(){

requestAnimationFrame(animate);

movePlayer();

velocityY+=gravity;
player.position.y+=velocityY;

checkCollision();

generatePlatforms();

updateScore();

//////////////// bubbles

for(const b of bubbles){

b.position.y+=0.01;

if(b.position.y>-1){

b.position.y=-3;
b.position.x=(Math.random()-0.5)*120;
b.position.z=(Math.random()-0.5)*120;

}

}

//////////////// lava kill

if(player.position.y<-3){

respawn();

}

renderer.render(scene,camera);

}

animate();

//////////////////////////
// RESIZE
//////////////////////////

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
